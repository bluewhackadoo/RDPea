name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate icons
        run: bun run generate-icons

      - name: Build (no publish)
        run: bunx --bun vite build && bunx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Publish signed artifacts to GitHub Release
        run: |
          $tag = "${{ github.ref_name }}"
          # Create release if it doesn't exist (other jobs may also create it)
          gh release create $tag --title "RDPea $tag" --generate-notes --draft=false 2>$null || true
          # Upload signed exe and update yml files
          Get-ChildItem release/*.exe, release/*.yml | ForEach-Object {
            Write-Host "Uploading: $($_.Name)"
            gh release upload $tag $_.FullName --clobber
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: |
            release/*.exe
            release/*.yml

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate icons
        run: bun run generate-icons

      - name: Build & publish
        run: bunx --bun vite build && bunx electron-builder --mac --publish onTag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-release
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate icons
        run: bun run generate-icons

      - name: Build & publish
        run: bunx --bun vite build && bunx electron-builder --linux --publish onTag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: |
            release/*.AppImage
            release/*.deb
            release/*.yml

  publish-winget:
    needs: build-windows
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Submit to Winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: bluewhackadoo.RDPea
          installers-regex: 'RDPea-Setup-.*\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  publish-chocolatey:
    needs: build-windows
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-release
          path: release

      - name: Build and push Chocolatey package
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $tag = "${{ github.ref_name }}"

          # Get SHA256 of the signed setup exe
          $setupExe = Get-ChildItem release/*Setup*.exe | Select-Object -First 1
          if (-not $setupExe) {
            Write-Error "Setup exe not found in release artifacts"
            exit 1
          }
          $sha256 = (Get-FileHash $setupExe.FullName -Algorithm SHA256).Hash
          $url = "https://github.com/bluewhackadoo/RDPea/releases/download/$tag/$($setupExe.Name)"

          Write-Host "Version: $version"
          Write-Host "URL: $url"
          Write-Host "SHA256: $sha256"

          # Update nuspec version and release notes URL
          $nuspec = Get-Content packaging/chocolatey/rdpea.nuspec -Raw
          $nuspec = $nuspec -replace '<version>[^<]*</version>', "<version>$version</version>"
          $nuspec = $nuspec -replace 'releases/tag/v[^"<]*', "releases/tag/$tag"
          Set-Content packaging/chocolatey/rdpea.nuspec $nuspec -NoNewline

          # Update install script URL and checksum
          $install = Get-Content packaging/chocolatey/tools/chocolateyinstall.ps1 -Raw
          $install = $install -replace "\`$url64\s*=\s*'[^']*'", "`$url64      = '$url'"
          $install = $install -replace "checksum64\s*=\s*'[^']*'", "checksum64    = '$sha256'"
          Set-Content packaging/chocolatey/tools/chocolateyinstall.ps1 $install -NoNewline

          Write-Host "--- Updated nuspec ---"
          Get-Content packaging/chocolatey/rdpea.nuspec
          Write-Host "--- Updated install script ---"
          Get-Content packaging/chocolatey/tools/chocolateyinstall.ps1

          # Pack and push
          choco pack packaging/chocolatey/rdpea.nuspec --output-directory .
          Get-ChildItem *.nupkg
          choco push "rdpea.$version.nupkg" --source https://push.chocolatey.org/ --api-key $env:CHOCOLATEY_API_KEY
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}

  publish-snap:
    needs: build-linux
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-release
          path: artifacts

      - name: Prepare snapcraft.yaml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE=$(ls artifacts/*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found in artifacts"
            exit 1
          fi
          APPIMAGE_NAME=$(basename "$APPIMAGE")

          echo "Version: $VERSION"
          echo "AppImage: $APPIMAGE_NAME"

          # Copy snapcraft.yaml to standard location and update version + source
          mkdir -p snap
          sed -e "s/^version: .*/version: '$VERSION'/" \
              -e "s|source: .*AppImage|source: $(realpath $APPIMAGE)|" \
              packaging/snap/snapcraft.yaml > snap/snapcraft.yaml

          echo "--- snapcraft.yaml ---"
          cat snap/snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
